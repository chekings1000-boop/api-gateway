name: API Gateway CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'api-gateway/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'api-gateway/**'

env:
  REGISTRY: docker.io  # Change to your registry (e.g., ghcr.io, your-registry.com)
  IMAGE_NAME: techcreate/api-gateway
  SERVICE_NAME: api-gateway

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: |
          cd api-gateway
          mvn clean test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: |
          cd api-gateway
          mvn clean package -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          file: ./api-gateway/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-dev:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: development
    
    steps:
      - name: Deploy to Development Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USERNAME }}
          key: ${{ secrets.DEV_SSH_KEY }}
          script: |
            docker pull techcreate/api-gateway:develop
            docker stop api-gateway || true
            docker rm api-gateway || true
            docker run -d \
              --name api-gateway \
              --network microservices-net \
              -p 8702:8702 \
              -e SPRING_CONFIG_IMPORT="optional:configserver:http://config-server-db:8701" \
              -e SPRING_APPLICATION_JSON='{
                "eureka": {
                  "client": {
                    "service-url": {
                      "defaultZone": "http://eureka-server:8761/eureka/"
                    }
                  }
                }
              }' \
              -e SPRING_PROFILES_ACTIVE=dev \
              techcreate/api-gateway:develop

  deploy-prod:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
      - name: Deploy to Production Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            docker pull techcreate/api-gateway:latest
            docker stop api-gateway || true
            docker rm api-gateway || true
            docker run -d \
              --name api-gateway \
              --network microservices-net \
              -p 8702:8702 \
              -e SPRING_CONFIG_IMPORT="optional:configserver:http://config-server-db:8701" \
              -e SPRING_APPLICATION_JSON='{
                "eureka": {
                  "client": {
                    "service-url": {
                      "defaultZone": "http://eureka-server:8761/eureka/"
                    }
                  }
                }
              }' \
              -e SPRING_PROFILES_ACTIVE=prod \
              techcreate/api-gateway:latest