name: API Gateway CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_IMAGE: techcreate/api-gateway
  SERVICE_NAME: api-gateway
  SERVICE_PORT: 8702

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn clean test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ github.ref_name }}
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
            ${{ github.ref_name == 'main' && format('{0}:latest', env.DOCKER_IMAGE) || '' }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            # Get the tag to deploy
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              TAG="latest"
            else
              TAG="develop"
            fi
            
            echo "Deploying ${{ env.SERVICE_NAME }} with tag: $TAG"
            
            # Pull the latest image
            docker pull ${{ env.DOCKER_IMAGE }}:$TAG
            
            # Stop and remove existing container
            docker stop ${{ env.SERVICE_NAME }} || true
            docker rm ${{ env.SERVICE_NAME }} || true
            
            # Run new container
            docker run -d \
              --name ${{ env.SERVICE_NAME }} \
              --network microservices-net \
              -p ${{ env.SERVICE_PORT }}:${{ env.SERVICE_PORT }} \
              -e SPRING_CONFIG_IMPORT="optional:configserver:http://config-server-db:8701" \
              -e SPRING_APPLICATION_JSON='{
                "eureka": {
                  "client": {
                    "service-url": {
                      "defaultZone": "http://eureka-server:8761/eureka/"
                    }
                  }
                }
              }' \
              -e SPRING_PROFILES_ACTIVE=dev \
              ${{ env.DOCKER_IMAGE }}:$TAG
            
            echo "Deployment completed for ${{ env.SERVICE_NAME }}"
