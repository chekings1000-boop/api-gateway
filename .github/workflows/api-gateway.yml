name: API Gateway CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_IMAGE: techcreate/api-gateway
  SERVICE_NAME: api-gateway
  SERVICE_PORT: 8702

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn clean test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ github.ref_name }}
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ env.SERVICE_NAME }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e  # Exit on error
            
            echo "========================================="
            echo "Starting deployment for API Gateway"
            echo "========================================="
            
            # Stop and remove existing container
            echo "Stopping existing container..."
            sudo docker stop api-gateway || true
            sudo docker rm api-gateway || true
            
            # Remove old images to force fresh pull
            echo "Removing old images..."
            sudo docker rmi techcreate/api-gateway:api-gateway || true
            sudo docker rmi techcreate/api-gateway:latest || true
            sudo docker rmi techcreate/api-gateway:develop || true
            sudo docker image prune -f
            
            # Pull the latest image
            echo "Pulling fresh image..."
            sudo docker pull techcreate/api-gateway:api-gateway
            
            # Verify the image was pulled
            echo "Verifying image..."
            sudo docker images | grep techcreate/api-gateway
            
            # Run the new container with proper network
            echo "Starting new container..."
            sudo docker run -d \
              --name api-gateway \
              --network microservices-net \
              -p 8702:8702 \
              -e SPRING_CONFIG_IMPORT="optional:configserver:http://config-server-db:8701" \
              -e SPRING_APPLICATION_JSON='{
                "eureka": {
                  "client": {
                    "service-url": {
                      "defaultZone": "http://eureka-server:8761/eureka/"
                    }
                  }
                }
              }' \
              -e SPRING_PROFILES_ACTIVE=dev \
              techcreate/api-gateway:api-gateway
            
            # Wait for container to start
            sleep 5
            
            # Check if container is running
            if sudo docker ps | grep -q api-gateway; then
              echo "✅ Container started successfully"
              echo "Container logs:"
              sudo docker logs api-gateway --tail 20
            else
              echo "❌ Container failed to start"
              echo "Error logs:"
              sudo docker logs api-gateway --tail 50 || true
              exit 1
            fi
            
            echo "========================================="
            echo "Deployment completed successfully!"
            echo "API Gateway is running on port 8702"
            echo "========================================="
